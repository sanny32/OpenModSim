name: Build macOS DMG (Qt6, Universal)

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
      tag:
        description: 'Checkout tag'
        required: false

permissions:
  contents: write

jobs:
  build-omodsim:
    name: Build OpenModSim macOS DMG version '${{ github.event.inputs.tag || github.event.inputs.branch || github.ref_name }}' with Qt6
    runs-on: macos-latest

    env:
      QT_VERSION: "6.9.3"
      QT_HOST: "mac"
      QT_TARGET: "desktop"
      QT_ARCH: "clang_64"
      QT_INSTALL_DIR: "${{ github.workspace }}/Qt"
      CMAKE_GENERATOR: "Ninja"
      CMAKE_OSX_ARCHITECTURES: "x86_64;arm64"
      BUILD_TYPE: "Release"
      DMG_PACKAGE_PREFIX: "qt6-omodsim"
      DMG_STAGING_DIR: "${{ github.workspace }}/dmg-root"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.event.inputs.branch || github.ref_name }}

      - name: Determine ref_type and ref_name
        run: |
          if [ "${{ github.ref_type }}" = "tag" ] || [ -n "${{ github.event.inputs.tag }}" ]; then
            REF_TYPE="tags"
            if [ -n "${{ github.event.inputs.tag }}" ]; then
              REF_NAME="${{ github.event.inputs.tag }}"
            else
              REF_NAME="${{ github.ref_name }}"
            fi
          else
            REF_TYPE="heads"
            REF_NAME="${{ github.ref_name }}"
          fi
          echo "REF_TYPE=$REF_TYPE" >> $GITHUB_ENV
          echo "REF_NAME=$REF_NAME" >> $GITHUB_ENV

      - name: Extract version from CMakeLists.txt
        run: |
          FULL_VERSION=$(grep -oE 'VERSION\s+[0-9]+\.[0-9]+\.[0-9]+' src/CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          APP_MAJOR_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1)
          
          BETA_RELEASE_ENABLED=false
          BETA_RELEASE=""
          TAG_NAME="${{ github.event.inputs.tag }}"
          if [ -z "$TAG_NAME" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME="${{ github.ref_name }}"
          fi
          BETA_RELEASE=$(printf '%s\n' "$TAG_NAME" | grep -Eo '(beta[0-9]+|b[0-9]+)$' || true)
          if [ -n "$BETA_RELEASE" ]; then
            BETA_RELEASE_ENABLED=true
          fi

          if [ "${GITHUB_REF_NAME}" = "dev" ] || [ "${{ github.event.inputs.branch }}" = "dev" ]; then
            MAJOR_MINOR=$(echo "$FULL_VERSION" | cut -d. -f1,2)
            APP_VERSION="${MAJOR_MINOR}~dev"
          else
            APP_VERSION="$FULL_VERSION"
            if [ "$BETA_RELEASE_ENABLED" = "true" ]; then
              APP_VERSION="${APP_VERSION}-${BETA_RELEASE}"
            fi
          fi

          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BETA_RELEASE=$BETA_RELEASE" >> $GITHUB_ENV
          echo "APP_MAJOR_VERSION=$APP_MAJOR_VERSION" >> $GITHUB_ENV
          echo "BETA_RELEASE_ENABLED=$BETA_RELEASE_ENABLED" >> $GITHUB_ENV

          echo "Extracted version: $APP_VERSION"

      - name: Install dependencies
        run: |
          brew list --versions ninja >/dev/null || brew install ninja
          brew list --versions cmake >/dev/null || brew install cmake

      - name: Install Python (for aqtinstall)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install aqtinstall
        run: python -m pip install aqtinstall

      - name: Download Qt
        run: |
          mkdir -p ${{ env.QT_INSTALL_DIR }}
          aqt install-qt \
            ${{ env.QT_HOST }} \
            ${{ env.QT_TARGET }} \
            ${{ env.QT_VERSION }} \
            ${{ env.QT_ARCH }} \
            -m qt5compat qtpdf qtserialport qtserialbus \
            -O ${{ env.QT_INSTALL_DIR }}

      - name: Add Qt to PATH
        run: echo "${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/macos/bin" >> $GITHUB_PATH

      - name: Set BUILD_DIR
        run: echo "BUILD_DIR=build-omodsim-Qt_${{ env.QT_VERSION }}_clang_64-${{ env.BUILD_TYPE }}" >> $GITHUB_ENV

      - name: Configure project
        run: |
          cmake src -B ${{ env.BUILD_DIR }} \
            -G "${{ env.CMAKE_GENERATOR }}" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/macos \
            -DCMAKE_INSTALL_PREFIX=/Applications \
            -DCMAKE_OSX_ARCHITECTURES="${{ env.CMAKE_OSX_ARCHITECTURES }}" \
            -DUSE_QT6=ON \
            -DPROJECT_BETARELEASE=${{ env.BETA_RELEASE }}

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel

      - name: Install app bundle into DMG staging directory
        run: |
          rm -rf "${{ env.DMG_STAGING_DIR }}"
          mkdir -p "${{ env.DMG_STAGING_DIR }}"
          cmake --install "${{ env.BUILD_DIR }}" --config "${{ env.BUILD_TYPE }}" --prefix "${{ env.DMG_STAGING_DIR }}"

      - name: Add Applications symlink to DMG staging directory
        run: |
          ln -s /Applications "${{ env.DMG_STAGING_DIR }}/Applications"

      - name: Verify universal app binary
        run: |
          lipo -info "${{ env.DMG_STAGING_DIR }}/omodsim.app/Contents/MacOS/omodsim"

      - name: Create DMG
        run: |
          DMG_NAME="${{ env.DMG_PACKAGE_PREFIX }}${{ env.APP_MAJOR_VERSION }}_${{ env.APP_VERSION }}.dmg"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

          hdiutil create -volname "Open ModSim ${{ env.APP_VERSION }}" \
            -srcfolder "${{ env.DMG_STAGING_DIR }}" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_NAME }}

      - name: Create or update GitHub Release and upload DMG
        if: false # Temporarily disable release creation until we have a stable release process in place
        # if: success() && github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ env.BETA_RELEASE_ENABLED }}
          tag_name: ${{ github.ref_name }}
          name: Open ModSim ${{ env.APP_VERSION }}
          files: |
            ${{ env.DMG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
