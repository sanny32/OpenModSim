name: Test Windows build script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.ps1'
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - '**/*.cmake'

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, tag, or commit to test"
        required: true
        default: dev
        type: string

permissions:
  contents: read

jobs:
  prepare-matrix:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Build matrix
        id: matrix
        run: |
          python3 - <<'PY'
          import json
          import os

          entries = [
              {
                  "name": "Windows 2022",
                  "runner": "windows-2022",
                  "qt_modes": ["qt5", "qt6"],
              },
              {
                  "name": "Windows 2025",
                  "runner": "windows-2025",
                  "qt_modes": ["qt5", "qt6"],
              },
          ]

          include = [
              {key: value for key, value in entry.items() if key != "qt_modes"} | {"qt_mode": qt_mode}
              for entry in entries
              for qt_mode in entry["qt_modes"]
          ]
          matrix = {"include": include}
          print(json.dumps(matrix, indent=2))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix)}\n")
          PY

  test-build-ps1:
    name: ${{ matrix.name }} (${{ matrix.qt_mode }})
    needs: prepare-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.sha }}

      - name: Show Windows version
        run: (Get-CimInstance Win32_OperatingSystem).Caption
        shell: pwsh

      - name: Run build.ps1
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass

          switch ("${{ matrix.qt_mode }}") {
            "qt5" { $buildArgs = @{ qt5 = $true } }
            "qt6" { $buildArgs = @{ qt6 = $true } }
            default {
              Write-Error "Unsupported Qt mode: ${{ matrix.qt_mode }}"
              exit 1
            }
          }
          & "${{ github.workspace }}\build.ps1" @buildArgs
        shell: pwsh
