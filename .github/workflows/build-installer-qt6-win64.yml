name: Build OpenModSim Installer (Windows x64, Qt6)

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
      tag:
        description: 'Checkout tag'
        required: false
      signing:
        description: 'Sign executable and installer'
        type: boolean
        default: false

permissions:
  contents: write

env:
  QT_VERSION: 6.9.3
  QT_ARCH: win64_msvc2022_64
  CMAKE_COMPILER: msvc2022_64
  CMAKE_GENERATOR: "Visual Studio 17 2022"
  CMAKE_ARCH: x64
  BUILD_TYPE: Release
  EXE_PACKAGE_PREFIX: qt6-omodsim2

  # SingPath variables
  PROJECT_SLUG: OpenModSim
  ORGANIZATION_ID: 6aeb3196-43e9-4b2c-83db-d1d90af47bc4
  ARTIFACT_CONF_SLUG: exe-zip

jobs:
  build-omodsim:
    name: Build OpenModSim installer version '${{ github.event.inputs.tag || github.event.inputs.branch || github.ref_name }}' with Qt6
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.event.inputs.branch || github.ref_name }}

      - name: Extract version from CMakeLists.txt
        run: |
          $versionMatch = Select-String -Path src\CMakeLists.txt -Pattern 'VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)' | Select-Object -First 1
          if (-not $versionMatch) { exit 1 }

          $APP_VERSION = $versionMatch.Matches[0].Groups[1].Value
          $BETA_RELEASE_ENABLED = 'false'
          $BETA_RELEASE = ''
          $TAG_NAME = '${{ github.event.inputs.tag }}'
          if ([string]::IsNullOrEmpty($TAG_NAME) -and '${{ github.ref_type }}' -eq 'tag') {
            $TAG_NAME = '${{ github.ref_name }}'
          }

          if ($TAG_NAME -match '(beta[0-9]+|b[0-9]+)$') {
            $BETA_RELEASE_ENABLED = 'true'
            $BETA_RELEASE = $Matches[1]
            $APP_VERSION = "$APP_VERSION-$BETA_RELEASE"
          }

          "APP_VERSION=$APP_VERSION" >> $env:GITHUB_ENV
          "BETA_RELEASE=$BETA_RELEASE" >> $env:GITHUB_ENV
          "BETA_RELEASE_ENABLED=$BETA_RELEASE_ENABLED" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Convert version for dev branch
        if: ${{ github.ref_name == 'dev' || github.event.inputs.branch == 'dev' || startsWith(github.ref_name, 'release/') || startsWith(github.event.inputs.branch, 'release/') }}
        run: |
          for /f "tokens=1,2 delims=." %%a in ("%APP_VERSION%") do (
            echo APP_VERSION=%%a.%%b-dev>>%GITHUB_ENV%
          )
          exit /b 0
        shell: cmd

      - name: Select signing policy
        run: |
          set SIGNING_POLICY_SLUG=none
          if "${{ env.ORGANIZATION_ID }}"=="" (
            echo WARNING: ORGANIZATION_ID is not set or empty, skipping signing steps.
          ) else (
            if "${{ github.event_name }}"=="push" (
              if "${{ github.ref_type }}"=="tag" (
                for /f %%i in ('echo "${{ github.ref_name }}" ^| find /i "test"') do set TAG_HAS_TEST=1
                if not defined TAG_HAS_TEST (
                  set SIGNING_POLICY_SLUG=release-signing
                )
              )
            )
            if "${{ github.event_name }}"=="workflow_dispatch" (
              if "${{ github.event.inputs.signing }}"=="true" (
                if not "${{ github.event.inputs.tag }}"=="" (
                  echo "%{{ github.event.inputs.tag }}%" | find /i "test" >nul
                  if errorlevel 1 (
                    set SIGNING_POLICY_SLUG=release-signing
                  )
                ) else (
                  set SIGNING_POLICY_SLUG=test-signing
                )
              )
            )
          )
          echo SIGNING_POLICY_SLUG=%SIGNING_POLICY_SLUG%>>%GITHUB_ENV%
          echo Selected signing policy: %SIGNING_POLICY_SLUG%
        shell: cmd

      - name: Install Python (for aqtinstall)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install aqtinstall
        run: |
          python -m pip install aqtinstall

      - name: Install Qt
        run: |
          python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} ${{ env.QT_ARCH }} -O C:\Qt -m qt5compat qtpdf qtserialport qtserialbus
        shell: cmd

      - name: Set BUILD_DIR
        run: |
          echo BUILD_DIR=build-omodsim-Qt_${{ env.QT_VERSION }}_${{ env.CMAKE_COMPILER }}bit-${{ env.BUILD_TYPE }}>>%GITHUB_ENV%
        shell: cmd

      - name: Get Visual Studio path
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" ^
           -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VS_PATH=%%i
          echo VS_PATH=%VS_PATH%>>%GITHUB_ENV%
        shell: cmd

      - name: Configure CMake
        run: |
          cmake src -B ${{ env.BUILD_DIR }} -G "${{ env.CMAKE_GENERATOR }}" -A ${{ env.CMAKE_ARCH }} -DCMAKE_PREFIX_PATH="C:/Qt/${{ env.QT_VERSION }}/${{ env.CMAKE_COMPILER }}" -DPROJECT_BETARELEASE=${{ env.BETA_RELEASE }}
        shell: cmd

      - name: Build
        run: |
          cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel
        shell: cmd

      - name: Copy docs
        run: xcopy %CD%\${{ env.BUILD_DIR }}\docs %CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\docs /E /I /Y
        shell: cmd

      - name: Copy demos
        run: xcopy %CD%\demos %CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\demos /E /I /Y
        shell: cmd

      - name: Upload Executable
        id: upload-exe
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: omodsim-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}.exe
          path: ${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\omodsim.exe

      - name: Signing Executable
        uses: signpath/github-action-submit-signing-request@v2
        if: success() && env.SIGNING_POLICY_SLUG != 'none'
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ env.ORGANIZATION_ID }}'
          project-slug: '${{ env.PROJECT_SLUG }}'
          signing-policy-slug: ${{ env.SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.ARTIFACT_CONF_SLUG }}
          github-artifact-id: '${{steps.upload-exe.outputs.artifact-id}}'
          output-artifact-directory: ${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600

      - name: Upload signed Executable
        uses: actions/upload-artifact@v7
        if: success() && env.SIGNING_POLICY_SLUG != 'none'
        with:
          name: omodsim-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}-signed.exe
          path: ${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\omodsim.exe

      - name: Deploy Qt dependencies using windeployqt
        run: |
          call "${{ env.VS_PATH }}\VC\Auxiliary\Build\vcvars64.bat"
          "C:\Qt\${{ env.QT_VERSION }}\${{ env.CMAKE_COMPILER }}\bin\windeployqt.exe" ^
            "%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\omodsim.exe" ^
            --release ^
            --no-opengl-sw ^
            --no-system-d3d-compiler ^
            --no-system-dxc-compiler ^
            --plugindir "%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\plugins" ^
            --skip-plugin-types help,generic,networkinformation,qmltooling ^
            --exclude-plugins qgif,qjpeg,qpdf,qsqlibase,qsqlmimer,qsqloci,qsqlodbc,qsqlpsql
        shell: cmd

      - name: Ensure Perl is available
        run: |
          where perl >nul 2>nul
          if errorlevel 1 (
            choco install strawberryperl -y --no-progress
          )
          perl -v
        shell: cmd

      - name: Ensure jom is available
        run: |
          where jom >nul 2>nul
          if errorlevel 1 (
            choco install jom --version=1.1.2 -y --no-progress
          )
          jom /?
        shell: cmd

      - name: Resolve latest OpenSSL 3.5 LTS version
        run: |
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/openssl/openssl/releases?per_page=100"
          $versions = $releases |
            Where-Object { -not $_.draft -and -not $_.prerelease -and $_.tag_name -match '^openssl-3\.5\.\d+$' } |
            ForEach-Object { $_.tag_name -replace '^openssl-', '' }

          if (-not $versions) {
            throw "No OpenSSL 3.5.x releases found."
          }

          $latest = $versions |
            Sort-Object { [version]$_ } -Descending |
            Select-Object -First 1

          "OPENSSL_VERSION=$latest" >> $env:GITHUB_ENV
          Write-Host "Resolved OpenSSL version: $latest"
        shell: pwsh

      - name: Build OpenSSL 3 runtime libraries
        run: |
          set OPENSSL_SOURCE_DIR=%RUNNER_TEMP%\openssl-%OPENSSL_VERSION%
          set OPENSSL_ARCHIVE=%RUNNER_TEMP%\openssl-%OPENSSL_VERSION%.tar.gz
          set OPENSSL_INSTALL_DIR=%RUNNER_TEMP%\openssl-%OPENSSL_VERSION%-install
          set BUILD_OUTPUT_DIR=%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}

          powershell -NoProfile -ExecutionPolicy Bypass -Command "Invoke-WebRequest -Uri 'https://github.com/openssl/openssl/releases/download/openssl-%OPENSSL_VERSION%/openssl-%OPENSSL_VERSION%.tar.gz' -OutFile '%OPENSSL_ARCHIVE%'"
          if errorlevel 1 exit /b 1

          tar -xzf "%OPENSSL_ARCHIVE%" -C "%RUNNER_TEMP%"
          if errorlevel 1 exit /b 1

          call "${{ env.VS_PATH }}\VC\Auxiliary\Build\vcvars64.bat"
          if errorlevel 1 exit /b 1

          cd /d "%OPENSSL_SOURCE_DIR%"
          if errorlevel 1 exit /b 1

          perl Configure VC-WIN64A shared no-apps no-docs no-asm no-tests --prefix="%OPENSSL_INSTALL_DIR%" --openssldir="%OPENSSL_INSTALL_DIR%\ssl"
          if errorlevel 1 exit /b 1

          set JOM_JOBS=%NUMBER_OF_PROCESSORS%
          if not defined JOM_JOBS set JOM_JOBS=4
          jom -j %JOM_JOBS%
          if errorlevel 1 exit /b 1

          copy /Y "%OPENSSL_SOURCE_DIR%\libssl-3-x64.dll" "%BUILD_OUTPUT_DIR%\"
          if errorlevel 1 exit /b 1

          copy /Y "%OPENSSL_SOURCE_DIR%\libcrypto-3-x64.dll" "%BUILD_OUTPUT_DIR%\"
          if errorlevel 1 exit /b 1
        shell: cmd

      - name: Remove qml folder
        run: |
          IF EXIST "%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\qml" (
            dir /a /b "%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\qml" | findstr . >nul
            IF ERRORLEVEL 1 (
              rmdir "%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}\qml"
            ) ELSE (
              echo "qml folder is not empty - keeping it"
            )
          ) ELSE (
            echo "No qml folder found — nothing to remove"
          )
          exit /b 0
        shell: cmd

      - name: Install NSIS
        run: |
          choco install nsis -y
        shell: cmd
          
      - name: Build NSIS installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" ^
           /DVERSION="${{ env.APP_VERSION }}" ^
           /DMIN_WINDOWS_VERSION=10 ^
           /DBUILD_PATH="%CD%\${{ env.BUILD_DIR }}\${{ env.BUILD_TYPE }}" ^
           /DICON_FILE="%CD%\src\res\omodsim.ico" ^
           /DWELCOMEFINISHPAGE_BITMAP="%CD%\.github\win32\nsis3-omodsim.bmp" ^
           /DLICENSE_FILE="%CD%\src\res\license.txt" ^
           /DOUTPUT_FILE="%CD%\${{ env.EXE_PACKAGE_PREFIX }}-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}.exe" ^
           %CD%\.github\win32\installer-win64.nsi
        shell: cmd

      - name: Upload Installer
        id: upload-installer
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: ${{ env.EXE_PACKAGE_PREFIX }}-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}
          path: ${{ env.EXE_PACKAGE_PREFIX }}-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}.exe

      - name: Signing Installer
        uses: signpath/github-action-submit-signing-request@v2
        if: success() && env.SIGNING_POLICY_SLUG != 'none'
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ env.ORGANIZATION_ID }}'
          project-slug: '${{ env.PROJECT_SLUG }}'
          signing-policy-slug: ${{ env.SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.ARTIFACT_CONF_SLUG }}
          github-artifact-id: '${{steps.upload-installer.outputs.artifact-id}}'
          output-artifact-directory: .
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600

      - name: Upload signed Installer
        uses: actions/upload-artifact@v7
        if: success() && env.SIGNING_POLICY_SLUG != 'none'
        with:
          name: ${{ env.EXE_PACKAGE_PREFIX }}-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}-signed
          path: ${{ env.EXE_PACKAGE_PREFIX }}-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}.exe

      - name: Create or update GitHub Release and upload EXE
        if: success() && github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ env.BETA_RELEASE_ENABLED }}
          tag_name: ${{ github.ref_name }}
          name: Open ModSim ${{ env.APP_VERSION }}
          files: |
            ${{ env.EXE_PACKAGE_PREFIX }}-${{ env.APP_VERSION }}_${{ env.CMAKE_ARCH }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
