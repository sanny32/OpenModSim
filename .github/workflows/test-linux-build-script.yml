name: Test Linux build script

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, tag, or commit to test"
        required: true
        default: dev
        type: string
      qt:
        description: "Qt version argument passed to build.sh"
        required: true
        default: "qt5"
        type: choice
        options:
          - qt5
          - qt6
          - auto

permissions:
  contents: read

jobs:
  prepare-matrix:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Build matrix
        id: matrix
        env:
          QT_MODE: ${{ inputs.qt || 'qt6' }}
        run: |
          python3 - <<'PY'
          import json
          import os

          qt_mode = os.environ["QT_MODE"]
          entries = [
              {
                  "name": "Debian 11",
                  "image": "debian:11",
                  "family": "apt",
                  "qt_modes": ["qt5"],
              },
              {
                  "name": "Debian 12",
                  "image": "debian:12",
                  "family": "apt",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Debian 13",
                  "image": "debian:13",
                  "family": "apt",
                  "qt_modes": ["qt6", "auto"],
              },
              {
                  "name": "Ubuntu 22.04",
                  "image": "ubuntu:22.04",
                  "family": "apt",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Ubuntu 24.04",
                  "image": "ubuntu:24.04",
                  "family": "apt",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Ubuntu 26.04",
                  "image": "ubuntu:26.04",
                  "family": "apt",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Fedora 41",
                  "image": "fedora:41",
                  "family": "dnf",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Fedora 42",
                  "image": "fedora:42",
                  "family": "dnf",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Fedora 43",
                  "image": "fedora:43",
                  "family": "dnf",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Fedora 44",
                  "image": "fedora:44",
                  "family": "dnf",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Rocky Linux 9.7",
                  "image": "rockylinux/rockylinux:9.7",
                  "family": "rocky",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Rocky Linux 10.1",
                  "image": "rockylinux/rockylinux:10.1",
                  "family": "rocky",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "RedOS 8",
                  "image": "registry.red-soft.ru/redos8c/ubi:latest",
                  "family": "dnf",
                  "qt_modes": ["qt5"],
              },
              {
                  "name": "openSUSE Leap 15.6",
                  "image": "opensuse/leap:15.6",
                  "family": "zypper",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "AstraLinux 1.7",
                  "image": "registry.astralinux.ru/astra/ubi17:latest",
                  "family": "apt",
                  "qt_modes": ["qt5"],
              },
              {
                  "name": "AstraLinux 1.8",
                  "image": "registry.astralinux.ru/astra/ubi18:latest",
                  "family": "apt",
                  "qt_modes": ["qt5"],
              },
              {
                  "name": "ALT Linux 11",
                  "image": "alt:p11",
                  "family": "alt",
                  "qt_modes": ["qt5", "qt6", "auto"],
              },
              {
                  "name": "Arch",
                  "image": "archlinux:latest",
                  "family": "pacman",
                  "qt_modes": ["qt6", "auto"],
              },
          ]

          include = [
              {key: value for key, value in entry.items() if key != "qt_modes"}
              for entry in entries
              if qt_mode in entry["qt_modes"]
          ]
          matrix = {"include": include}
          print(json.dumps(matrix, indent=2))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix)}\n")
          PY

  test-build-sh:
    name: ${{ matrix.name }} (${{ inputs.qt || 'qt6' }})
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    container:
      image: ${{ matrix.image }}
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC

    steps:
      - name: Prepare container
        run: |
          case "${{ matrix.family }}" in
            apt)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y ca-certificates git sudo
              ;;
            dnf)
              dnf install -y ca-certificates git sudo
              ;;
            rocky)
              dnf install -y ca-certificates git sudo dnf-plugins-core
              dnf config-manager --set-enabled crb
              dnf install -y epel-release
              ;;
            zypper)
              zypper --gpg-auto-import-keys --non-interactive refresh
              zypper --gpg-auto-import-keys --non-interactive dup --allow-vendor-change
              zypper --gpg-auto-import-keys --non-interactive install ca-certificates git sudo
              ;;
            alt)
              apt-get update
              apt-get install -y ca-certificates git sudo
              ;;
            pacman)
              pacman -Sy --noconfirm ca-certificates git sudo
              ;;
            *)
              echo "Unsupported package family: ${{ matrix.family }}"
              exit 1
              ;;
          esac

      - name: Checkout repository
        env:
          CHECKOUT_REF: ${{ inputs.branch || github.sha }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init -b checkout "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$CHECKOUT_REF"
          git checkout --detach FETCH_HEAD

      - name: Show OS release
        run: |
          cat /etc/os-release

      - name: Run build.sh
        env:
          QT_MODE: ${{ inputs.qt || 'qt6' }}
        run: |
          case "$QT_MODE" in
            qt5)
              BUILD_ARGS="-qt5"
              ;;
            qt6)
              BUILD_ARGS="-qt6"
              ;;
            auto)
              BUILD_ARGS=""
              ;;
            *)
              echo "Unsupported Qt input: $QT_MODE"
              exit 1
              ;;
          esac

          chmod +x ./build.sh
          ./build.sh $BUILD_ARGS
