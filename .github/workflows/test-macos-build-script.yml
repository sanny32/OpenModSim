name: Test macOS build script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.sh'
      - 'CMakeLists.txt'
      - '**/CMakeLists.txt'
      - '**/*.cmake'

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, tag, or commit to test"
        required: true
        default: dev
        type: string

permissions:
  contents: read

jobs:
  test-build-macos-sh:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS 14"
            runner: macos-14
          - name: "macOS 15"
            runner: macos-15
          - name: "macOS 26"
            runner: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.sha }}

      - name: Show macOS version
        run: sw_vers

      - name: Run build-macos.sh
        run: |
          chmod +x ./build-macos.sh
          ./build-macos.sh
