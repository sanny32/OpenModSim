name: Test macOS build script

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, tag, or commit to test"
        required: true
        default: dev
        type: string

permissions:
  contents: read

jobs:
  test-build-macos-sh:
    name: ${{ matrix.name }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS 14"
            runner: macos-14
          - name: "macOS 15"
            runner: macos-15
          - name: "macOS 26"
            runner: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.event.workflow_run.head_sha || github.sha }}

      - name: Show macOS version
        run: sw_vers

      - name: Run build-macos.sh
        run: |
          chmod +x ./build-macos.sh
          ./build-macos.sh
