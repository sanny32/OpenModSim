name: Build RPM package (Ubuntu x64, Qt6)

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      branch:
        description: 'Checkout branch'
        required: false
        default: dev
      tag:
        description: 'Checkout tag'
        required: false

permissions:
  contents: write

jobs:
  build-omodsim:
    name: Build OpenModSim rpm package version '${{ github.event.inputs.tag || github.event.inputs.branch || github.ref_name }}' with Qt6
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    env:
      QT_VERSION: "6.9.3"
      QT_HOST: "linux"
      QT_TARGET: "desktop"
      QT_ARCH: "linux_gcc_64"
      QT_INSTALL_DIR: "/opt/Qt"
      QT_QPA_PLATFORM: "xcb"
      CMAKE_COMPILER: "gcc_64"
      CMAKE_GENERATOR: "Ninja"
      BUILD_TYPE: "Release"
      RPM_REVISION: "1"
      RPM_ARCH: "x86_64"
      RPM_PACKAGE_PREFIX: "qt6-omodsim"
      APP_INSTALL_PREFIX: "/opt/OpenModSim"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.event.inputs.branch || github.ref_name }}

      - name: Determine ref_type and ref_name
        run: |
          if [ "${{ github.ref_type }}" = "tag" ] || [ -n "${{ github.event.inputs.tag }}" ]; then
            REF_TYPE="tags"
            if [ -n "${{ github.event.inputs.tag }}" ]; then
              REF_NAME="${{ github.event.inputs.tag }}"
            else
              REF_NAME="${{ github.ref_name }}"
            fi
          else
            REF_TYPE="heads"
            REF_NAME="${{ github.ref_name }}"
          fi
          echo "REF_TYPE=$REF_TYPE" >> $GITHUB_ENV
          echo "REF_NAME=$REF_NAME" >> $GITHUB_ENV
          echo "Ref name is: $REF_NAME"
          echo "Ref type is: $REF_TYPE"

      - name: Extract info from CMakeLists.txt
        id: extract_info
        run: |
          FULL_VERSION=$(grep -oP 'VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' src/CMakeLists.txt)
          PRODUCT_NAME=$(grep -oP 'set\(PRODUCT_NAME\s+"\K[^"]+' src/CMakeLists.txt)
          VERSION_MAJOR=$(echo "$FULL_VERSION" | cut -d. -f1)
          RPM_PACKAGE_NAME="${{ env.RPM_PACKAGE_PREFIX }}${VERSION_MAJOR}"
          
          BETA_RELEASE_ENABLED=false
          BETA_RELEASE=""
          TAG_NAME="${{ github.event.inputs.tag }}"
          if [ -z "$TAG_NAME" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME="${{ github.ref_name }}"
          fi
          BETA_RELEASE=$(printf '%s\n' "$TAG_NAME" | grep -Eo '(beta[0-9]+|b[0-9]+)$' || true)
          if [ -n "$BETA_RELEASE" ]; then
            BETA_RELEASE_ENABLED=true
          fi

          if [ "${GITHUB_REF_NAME}" = "dev" ] || [ "${{ github.event.inputs.branch }}" = "dev" ] || [ "${GITHUB_REF_NAME}" = release/* ] || [ "${{ github.event.inputs.branch }}" = release/* ]; then
            MAJOR_MINOR=$(echo "$FULL_VERSION" | cut -d. -f1,2)
            APP_VERSION="${MAJOR_MINOR}~dev"
          else
            APP_VERSION="$FULL_VERSION"
            if [ "$BETA_RELEASE_ENABLED" = "true" ]; then
              APP_VERSION="${APP_VERSION}~${BETA_RELEASE}"
            fi
          fi

          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BETA_RELEASE=$BETA_RELEASE" >> $GITHUB_ENV
          echo "PRODUCT_NAME=$PRODUCT_NAME" >> $GITHUB_ENV
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> $GITHUB_ENV
          echo "RPM_PACKAGE_NAME=$RPM_PACKAGE_NAME" >> $GITHUB_ENV
          echo "BETA_RELEASE_ENABLED=$BETA_RELEASE_ENABLED" >> $GITHUB_ENV

          echo "Extracted version: $APP_VERSION"
          echo "Extracted product name: $PRODUCT_NAME"
          echo "RPM package name: $RPM_PACKAGE_NAME"

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            git build-essential ninja-build cmake patchelf rsync \
            rpm gnupg2 \
            libglu1-mesa libgl1-mesa-dev libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-xinerama0 libxcb-cursor0 libxcb-keysyms1 libxcb-xfixes0 \
            libxcb-shape0 libxcb-render-util0 libxcb-icccm4 libxcb-image0 \
            libfontconfig1 libfreetype6 libx11-6 libxext6 libxrender1 \
            zlib1g-dev libpng-dev libjpeg-dev libdbus-1-3 \
            libwayland-cursor0 libwayland-egl1-mesa \
            libgtk-3-0 libgdk-pixbuf2.0-0 libpangocairo-1.0-0 libpango-1.0-0 libatk1.0-0 libcairo2 libcairo-gobject2 \
            libcups2 \
            odbcinst libodbc1 \
            libpq5 libmysqlclient21

      - name: Install Python 3.12 from sources
        run: |
          apt-get install -y wget libssl-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev \
            libffi-dev libbz2-dev liblzma-dev libgdbm-dev libnss3-dev \
            libncurses-dev libgdbm-compat-dev xz-utils

          wget https://www.python.org/ftp/python/3.12.2/Python-3.12.2.tgz
          tar xvf Python-3.12.2.tgz
          cd Python-3.12.2

          ./configure
          make -j$(nproc)
          make altinstall

      - name: Set Python 3.12 as default
        run: |
          update-alternatives --install /usr/bin/python3 python3 /usr/local/bin/python3.12 2
          update-alternatives --set python3 /usr/local/bin/python3.12

      - name: Upgrade pip
        run: |
          python3 -m ensurepip --upgrade
          python3 -m pip install --upgrade pip

      - name: Install aqtinstall
        run: |
          python3 -m pip install aqtinstall

      - name: Download Qt
        run: |
          mkdir -p ${{ env.QT_INSTALL_DIR }}
          aqt install-qt \
            ${{ env.QT_HOST }} \
            ${{ env.QT_TARGET }} \
            ${{ env.QT_VERSION }} \
            ${{ env.QT_ARCH }} \
            -m qt5compat qtpdf qtserialport qtserialbus \
            -O ${{ env.QT_INSTALL_DIR }}

      - name: Add Qt to PATH
        run: echo "${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/${{ env.CMAKE_COMPILER }}/bin" >> $GITHUB_PATH

      - name: Install cmake 3.26
        run: |
          apt-get remove -y cmake
          wget https://github.com/Kitware/CMake/releases/download/v3.26.5/cmake-3.26.5-linux-x86_64.sh
          sh cmake-3.26.5-linux-x86_64.sh --skip-license --prefix=/usr/local
          cmake --version

      - name: Set BUILD_DIR
        run: echo "BUILD_DIR=build-omodsim-Qt_${{ env.QT_VERSION }}_${{ env.CMAKE_COMPILER }}bit-${{ env.BUILD_TYPE }}" >> $GITHUB_ENV

      - name: Configure project
        run: |
            cmake src -B ${{ env.BUILD_DIR }} \
            -G "${{ env.CMAKE_GENERATOR }}" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/${{ env.CMAKE_COMPILER }} \
            -DPROJECT_BETARELEASE=${{ env.BETA_RELEASE }}

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel

      - name: Set BUILD_RPM_DIR
        run: echo "BUILD_RPM_DIR=build-rpm-package-Qt_${{ env.QT_VERSION }}_${{ env.CMAKE_COMPILER }}bit" >> $GITHUB_ENV

      - name: Create RPM build directories
        run: |
          mkdir -p ${{ env.BUILD_RPM_DIR }}/BUILD
          mkdir -p ${{ env.BUILD_RPM_DIR }}/RPMS
          mkdir -p ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim
          mkdir -p ${{ env.BUILD_RPM_DIR }}/SPECS
          mkdir -p ${{ env.BUILD_RPM_DIR }}/SRPMS
          
      - name: Copy files to BUILD_RPM_DIR
        run: |
          rsync -a .github/linux/rpm/* ${{ env.BUILD_RPM_DIR }}/SPECS
          rsync -a .github/linux/usr/* ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr
         
      - name: Install cqtdeployer from sources
        run: |
          git clone https://github.com/QuasarApp/CQtDeployer.git
          cd CQtDeployer
          git checkout v1.6.2365
          wget -qO- https://github.com/QuasarApp/CQtDeployer/pull/846.patch | git apply
          git submodule update --init --recursive
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/${{ env.CMAKE_COMPILER }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DCQT_DEPLOYER_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_INSTALL_RPATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/${{ env.CMAKE_COMPILER }}/lib \
            -Wno-dev
          cmake --build build --parallel
          cmake --install build

      - name: Resolve latest OpenSSL 3.5 LTS version
        run: |
          OPENSSL_VERSION=$(python3 - <<'PY'
          import json
          import re
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/openssl/openssl/releases?per_page=100",
              headers={"User-Agent": "omodsim-ci"},
          )
          with urllib.request.urlopen(req) as response:
              releases = json.load(response)

          versions = []
          for release in releases:
              if release.get("draft") or release.get("prerelease"):
                  continue
              tag = release.get("tag_name", "")
              match = re.fullmatch(r"openssl-(3\.5\.\d+)", tag)
              if match:
                  versions.append(tuple(int(part) for part in match.group(1).split(".")))

          if not versions:
              raise SystemExit("No OpenSSL 3.5.x releases found")

          latest = max(versions)
          print(f"{latest[0]}.{latest[1]}.{latest[2]}")
          PY
          )

          echo "OPENSSL_VERSION=$OPENSSL_VERSION" >> $GITHUB_ENV
          echo "Resolved OpenSSL version: $OPENSSL_VERSION"

      - name: Build and install OpenSSL 3 runtime libraries
        run: |
          wget https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz
          tar xvf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}
          ./config \
            shared zlib no-apps no-docs no-tests
          make -j$(nproc) build_libs
          make install_runtime_libs

      - name: Bundle Qt libraries and plugins throught cqtdeployer
        run: |
          CQtDeployer -bin ${{ env.BUILD_DIR }}/omodsim \
            -targetDir ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim${{ env.APP_INSTALL_PREFIX }}${{ env.VERSION_MAJOR }} \
            -libDir ${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/${{ env.CMAKE_COMPILER }}/lib \
            -ignore libcrypto.so.3,libmysqlclient.so.21,libpq.so.5,libssl.so.3,libqsqlmimer.so,libqsqlmysql.so,libqsqlodbc.so,libqsqlpsql.so,libqsqlibase.so,libqsqloci.so \
            -extraLibs icudata,icui18n,icuuc,libxcb-util,libxcb-cursor \
            -customScript 'export QT_QPA_PLATFORM=${{ env.QT_QPA_PLATFORM }}'

      - name: Copy OpenSSL 3 libraries
        run: |
          cp /usr/local/lib64/libssl.so.3 \
             /usr/local/lib64/libcrypto.so.3 \
             "${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim${{ env.APP_INSTALL_PREFIX }}${{ env.VERSION_MAJOR }}/lib/"

      - name: Copy OpenModsim docs
        run: rsync -a "${{ env.BUILD_DIR }}/docs/" "${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim${{ env.APP_INSTALL_PREFIX }}${{ env.VERSION_MAJOR }}/docs/"

      - name: Copy demos
        run: rsync -a "demos/" "${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim${{ env.APP_INSTALL_PREFIX }}${{ env.VERSION_MAJOR }}/demos/"

      - name: Rename app icon files
        run: |
          for size in 16x16 32x32 64x64 128x128; do
            mv "${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/icons/hicolor/${size}/apps/omodsim.png" \
               "${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/icons/hicolor/${size}/apps/omodsim${{ env.VERSION_MAJOR }}.png"
          done

      - name: Create RPM spec file
        run: |
          sed -e "s|@PACKAGE_NAME@|${{ env.RPM_PACKAGE_NAME }}|g" \
              -e "s|@APP_VERSION@|${{ env.APP_VERSION }}|g" \
              ${{ env.BUILD_RPM_DIR }}/SPECS/omodsim.spec.in > ${{ env.BUILD_RPM_DIR }}/SPECS/omodsim.spec
          rm ${{ env.BUILD_RPM_DIR }}/SPECS/omodsim.spec.in
          cat -n ${{ env.BUILD_RPM_DIR }}/SPECS/omodsim.spec

      - name: Create metainfo file
        run: |
          sed -e "s|@REF_NAME@|${{ env.REF_NAME }}|g" \
              -e "s|@REF_TYPE@|${{ env.REF_TYPE }}|g" \
              -e "s|@COMPONENT_ID@|omodsim${{ env.VERSION_MAJOR }}.desktop|g" \
              -e "s|@APP_NAME@|${{ env.PRODUCT_NAME }} ${{ env.VERSION_MAJOR }}|g" \
              -e "s|@APP_EXEC@|omodsim${{ env.VERSION_MAJOR }}|g" \
              -e "s|@APP_VERSION@|${{ env.APP_VERSION }}|g" \
              -e "s|@BUILD_DATE@|$(date +%Y-%m-%d)|g" \
              ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/metainfo/omodsim.metainfo.xml.in > ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/metainfo/omodsim${{ env.VERSION_MAJOR }}.metainfo.xml
          rm ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/metainfo/omodsim.metainfo.xml.in
          cat -n ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/metainfo/omodsim${{ env.VERSION_MAJOR }}.metainfo.xml

      - name: Create desktop file
        run: |
          sed -e "s|@APP_NAME@|${{ env.PRODUCT_NAME }} ${{ env.VERSION_MAJOR }}|g" \
              -e "s|@APP_EXEC@|omodsim${{ env.VERSION_MAJOR }}|g" \
              -e "s|@APP_ICON@|omodsim${{ env.VERSION_MAJOR }}|g" \
              ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/applications/omodsim.desktop.in > ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/applications/omodsim${{ env.VERSION_MAJOR }}.desktop
          rm ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/applications/omodsim.desktop.in
          cat -n ${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim/usr/share/applications/omodsim${{ env.VERSION_MAJOR }}.desktop

      - name: Patch binary file
        run: patchelf --set-rpath "${{ env.APP_INSTALL_PREFIX }}${{ env.VERSION_MAJOR }}/lib" "${{ env.BUILD_RPM_DIR }}/SOURCES/omodsim${{ env.APP_INSTALL_PREFIX }}${{ env.VERSION_MAJOR }}/bin/omodsim"

      - name: Import GPG keys
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build RPM package
        working-directory: ${{ env.BUILD_RPM_DIR }}
        run: rpmbuild --define "_topdir `pwd`" -v -ba SPECS/omodsim.spec

      - name: Sign RPM package
        working-directory: ${{ env.BUILD_RPM_DIR }}
        run: |
          RPM_FILE="${{ env.RPM_PACKAGE_NAME }}-${{ env.APP_VERSION }}-${{ env.RPM_REVISION }}.${{ env.RPM_ARCH }}.rpm" 
          SAFE_RPM_FILE=$(echo "$RPM_FILE" | sed 's/~/−/g')
          
          if [ "$RPM_FILE" != "$SAFE_RPM_FILE" ]; then
            mv "RPMS/${RPM_ARCH}/$RPM_FILE" "RPMS/${RPM_ARCH}/$SAFE_RPM_FILE"
          fi
          rpmsign --addsign --define "_gpg_name 841A6E73CED20603737BDCBA457ECBB2757E57F1" "RPMS/${RPM_ARCH}/$SAFE_RPM_FILE"

          if [ "$RPM_FILE" != "$SAFE_RPM_FILE" ]; then
            mv "RPMS/${RPM_ARCH}/$SAFE_RPM_FILE" "RPMS/${RPM_ARCH}/$RPM_FILE"
          fi

      - name: Upload RPM package
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: ${{ env.RPM_PACKAGE_NAME }}-${{ env.APP_VERSION }}-${{ env.RPM_REVISION }}.${{ env.RPM_ARCH }}
          path: ${{ env.BUILD_RPM_DIR }}/RPMS/${{ env.RPM_ARCH }}/${{ env.RPM_PACKAGE_NAME }}-${{ env.APP_VERSION }}-${{ env.RPM_REVISION }}.${{ env.RPM_ARCH }}.rpm

      - name: Save public GPG key to file
        env:
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
        run: |
          echo "$GPG_PUBLIC_KEY" > ${{ env.RPM_PACKAGE_NAME }}.rpm.pubkey

      - name: Upload public GPG key
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RPM_PACKAGE_NAME }}.rpm.pubkey
          path: ${{ env.RPM_PACKAGE_NAME }}.rpm.pubkey

      - name: Create or update GitHub Release and upload RPM
        if: success() && github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ env.BETA_RELEASE_ENABLED }}
          tag_name: ${{ github.ref_name }}
          name: Open ModSim ${{ env.APP_VERSION }}
          files: |
            ${{ env.BUILD_RPM_DIR }}/RPMS/${{ env.RPM_ARCH }}/${{ env.RPM_PACKAGE_NAME }}-${{ env.APP_VERSION }}-${{ env.RPM_REVISION }}.${{ env.RPM_ARCH }}.rpm
            ${{ env.RPM_PACKAGE_NAME }}.rpm.pubkey
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
