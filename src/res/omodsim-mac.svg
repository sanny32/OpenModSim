<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#353a47"/>
      <stop offset="100%" stop-color="#1c2028"/>
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#10f5f4"/>
      <stop offset="100%" stop-color="#00c4d4"/>
    </linearGradient>

    <linearGradient id="grayGradTR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f3f4f7"/>
      <stop offset="100%" stop-color="#d5d6de"/>
    </linearGradient>

    <linearGradient id="grayGradBL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="15%"  stop-color="#f5f5f9"/>
      <stop offset="100%" stop-color="#d9dbe3"/>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#235fb1"/>
      <stop offset="12%"  stop-color="#0035fc"/>
      <stop offset="100%" stop-color="#0018ce"/>
    </linearGradient>
  </defs>

  <!-- Background fills the entire canvas -->
  <rect x="0" y="0" width="1024" height="1024" rx="204" ry="204"
        fill="url(#bgGrad)"/>

  <!-- Top-left: Cyan card -->
  <rect x="109" y="228" width="373" height="237" rx="38" ry="38"
        fill="url(#cyanGrad)"/>

  <!-- Top-right: Gray card -->
  <rect x="543" y="228" width="373" height="237" rx="38" ry="38"
        fill="url(#grayGradTR)"/>

  <!-- Bottom-left: Gray card -->
  <rect x="109" y="539" width="373" height="242" rx="38" ry="38"
        fill="url(#grayGradBL)"/>

  <!-- Bottom-right: Blue card -->
  <rect x="543" y="539" width="373" height="242" rx="38" ry="38"
        fill="url(#blueGrad)"/>
</svg>
